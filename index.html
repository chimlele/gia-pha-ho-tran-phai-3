<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Dòng Họ</title>
    <script src="https://balkan.app/js/familytree.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Arial, sans-serif; }
        #tree { width: 100%; height: 100%; }
        /* Ẩn hoàn toàn thanh công cụ và tìm kiếm của thư viện */
        .bft-search-control, .bft-toolbar { display: none !important; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 1000; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 8px; border: 1px solid #d4af37; }
        
        /* Màu sắc Nam/Nữ */
        .node.male rect { fill: #1565C0 !important; } 
        .node.female rect { fill: #AD1457 !important; }
    </style>
</head>
<body>

    <div id="loading">Đang tải dữ liệu gia phả...</div>
    <div id="tree"></div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTouJUB4GpQB_VQ9JNfO2DAp26KLsS94ODZqf7XclWZbm-nWXy1RzJpxq2BW7RX9do0wfqxgCN1uYyn/pub?output=csv";

        function renderTree(rawData) {
            document.getElementById('loading').style.display = 'none';

            const cleanNodes = rawData.map(item => {
                let row = {};
                for (let key in item) { row[key.trim()] = item[key]; }
                
                let pidsVal = null;
                if (row["PIDS"]) {
                    let rawPids = String(row["PIDS"]).replace(/[\[\]\s]/g, ''); 
                    if (rawPids) pidsVal = rawPids.split(',').filter(x => x).map(Number);
                }

                let genderTag = String(row["Giới tính"]).toLowerCase().trim() === "nữ" ? "female" : "male";

                return {
                    id: Number(row["ID"]),
                    fid: row["FID"] ? Number(row["FID"]) : null,
                    mid: row["MID"] ? Number(row["MID"]) : null,
                    pids: pidsVal,
                    name: row["Họ Và Tên"] || "Không rõ",
                    tags: [genderTag],
                    life: row["Vòng đời"] || "",
                    img: row["Photo"] || "", 
                    notes: row["Ghi chú"] || ""
                };
            }).filter(node => !isNaN(node.id));

            const chart = new FamilyTree(document.getElementById("tree"), {
                template: "hugo",
                mode: "dark",
                readOnly: true,
                enableSearch: false, // Tắt tìm kiếm
                enablePan: true,
                mouseScrol: FamilyTree.action.zoom,
                
                // QUAN TRỌNG: Tắt hoàn toàn chức năng thu gọn nhánh (+/-)
                collapse: false, 
                
                // Popup chi tiết khi nhấn vào người
                editForm: {
                    readOnly: true,
                    buttons: { edit: null, share: null, pdf: null, remove: null },
                    elements: [
                        { type: 'textbox', label: 'Họ Và Tên', binding: 'name' },
                        { type: 'textbox', label: 'Vòng đời', binding: 'life' },
                        { type: 'fullwidth', label: 'Ghi chú', binding: 'notes' }
                    ]
                },

                nodeBinding: {
                    field_0: "name",
                    field_1: "life",
                    img_0: "img"
                },
                nodes: cleanNodes
            });

            // Mở thông tin khi nhấn vào ô
            chart.on('click', function (sender, args) {
                sender.editUI.show(args.node.id, true);
                return false; 
            });
        }

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) { renderTree(results.data); },
            error: function() { document.getElementById('loading').innerHTML = "Lỗi kết nối dữ liệu!"; }
        });
    </script>
</body>
</html>
