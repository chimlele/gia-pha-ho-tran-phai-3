<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Gia Phả Dòng Họ</title>
    <script src="https://balkan.app/js/familytree.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #212121; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #tree { width: 100%; height: 100%; }
        #loading { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #fff; z-index: 1000; background: rgba(0,0,0,0.85); padding: 30px; 
            border-radius: 15px; border: 1px solid #d4af37; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* Tùy chỉnh thanh tìm kiếm */
        .bft-search-control input { border-radius: 20px !important; }

        /* ĐỊNH NGHĨA MÀU SẮC NAM/NỮ */
        /* Màu xanh cho Nam (male) */
        .bft-dark .node.male rect {
            fill: #1565C0; /* Màu xanh đậm */
            stroke: #90CAF9; /* Viền xanh nhạt */
        }
        /* Màu hồng cho Nữ (female) */
        .bft-dark .node.female rect {
            fill: #C62828; /* Màu đỏ/hồng đậm */
            stroke: #EF9A9A; /* Viền hồng nhạt */
        }
        /* Tùy chỉnh màu chữ để dễ đọc trên nền màu */
        .node.male text, .node.female text {
            fill: #ffffff !important;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 20px; margin-bottom: 10px;">🌟 Đang khởi tạo dữ liệu gia tộc...</div>
        <div style="font-size: 14px; color: #aaa;">Vui lòng đợi trong giây lát</div>
    </div>
    
    <div id="tree"></div>

    <script>
        // Link CSV đã được tích hợp trực tiếp
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTouJUB4GpQB_VQ9JNfO2DAp26KLsS94ODZqf7XclWZbm-nWXy1RzJpxq2BW7RX9do0wfqxgCN1uYyn/pub?output=csv";

        function renderTree(rawData) {
            // Ẩn thông báo đang tải
            document.getElementById('loading').style.display = 'none';

            // Xử lý dữ liệu thô từ CSV sang định dạng Nodes của Balkan
            const cleanNodes = rawData.map(item => {
                let row = {};
                // Trim khoảng trắng thừa trong tiêu đề cột
                for (let key in item) { row[key.trim()] = item[key]; }

                // Xử lý mảng Vợ/Chồng (PIDS)
                let pidsVal = null;
                if (row["PIDS"]) {
                    let rawPids = String(row["PIDS"]).replace(/[\[\]\s]/g, ''); 
                    if (rawPids) pidsVal = rawPids.split(',').filter(x => x).map(Number);
                }

                // CHUẨN HÓA DỮ LIỆU GIỚI TÍNH ĐỂ PHÂN MÀU
                let genderVal = String(row["Giới tính"]).toLowerCase().trim();
                let genderClass = "male"; // Mặc định là nam nếu không rõ
                if (genderVal === "nữ" || genderVal === "female") {
                    genderClass = "female";
                }

                return {
                    id: Number(row["ID"]),
                    fid: row["FID"] ? Number(row["FID"]) : null,
                    mid: row["MID"] ? Number(row["MID"]) : null,
                    pids: pidsVal,
                    name: row["Họ Và Tên"] || "Chưa rõ tên",
                    // Balkan dùng trường 'gender' để tự động áp dụng class CSS 'male' hoặc 'female'
                    gender: genderClass, 
                    birth: row["Năm sinh"] || "Chưa rõ",
                    death: row["Năm mất"] || "Còn sống",
                    life: row["Vòng đời"] || "", // Sẽ hiện dòng 2 trên sơ đồ
                    img: row["Photo"] || "", 
                    notes: row["Ghi chú"] || ""
                };
            }).filter(node => !isNaN(node.id)); // Loại bỏ dòng trống hoặc lỗi ID

            // Khởi tạo sơ đồ
            const chart = new FamilyTree(document.getElementById("tree"), {
                mouseScrol: FamilyTree.action.zoom,
                enableSearch: true,
                // SỬ DỤNG TEMPLATE 'base' ĐỂ DỄ DÀNG TÙY BIẾN MÀU SẮC QUA CSS
                template: "base", 
                mode: "dark",
                readOnly: true,
                
                // Cấu hình thu phóng nhánh (Nút +/-)
                collapse: { 
                    level: 3, // Mặc định mở đến đời thứ 3
                    allChildren: true 
                },
                nodeCircleSize: 20,

                // Cấu hình bảng chi tiết khi nhấn vào 1 người
                editForm: {
                    readOnly: true,
                    titleBinding: "name",
                    photoBinding: "img",
                    buttons: { edit: null, share: null, pdf: null, remove: null },
                    elements: [
                        { type: 'textbox', label: 'Họ Và Tên', binding: 'name' },
                        { type: 'textbox', label: 'Ngày Tháng Năm Sinh', binding: 'birth' },
                        { type: 'textbox', label: 'Ngày Tháng Năm Mất', binding: 'death' },
                        { type: 'fullwidth', label: 'Tiểu sử / Ghi chú', binding: 'notes' }
                    ]
                },

                // Gán dữ liệu hiển thị lên ô vuông trên sơ đồ
                nodeBinding: {
                    field_0: "name", // Dòng 1
                    field_1: "life", // Dòng 2: Hiện "Vòng đời" (Năm sinh - Năm mất)
                    img_0: "img"     // Hiện ảnh
                },
                nodes: cleanNodes
            });
        }

        // Thực hiện tải dữ liệu CSV
        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                renderTree(results.data);
            },
            error: function() {
                document.getElementById('loading').innerHTML = 
                    "<b style='color:#ff5252'>Lỗi dữ liệu:</b> Không thể kết nối với file Google Sheets của bạn. Hãy đảm bảo bạn đã 'Xuất bản lên web' đúng định dạng CSV.";
            }
        });
    </script>
</body>
</html>
